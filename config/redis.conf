# Redis configuration for IB Trader
# Runs on localhost only, no external access needed.

bind 127.0.0.1
port 6379

# Persistence: AOF + RDB snapshots
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Data directory
dir ./run/redis-data

# Logging
loglevel notice
logfile ""

# Daemonize (runs in background)
daemonize no

# PID file
pidfile ./run/redis.pid

# Max memory (conservative for single-user trading app)
maxmemory 256mb
maxmemory-policy noeviction
