max_order_size_shares: 5000
max_retries: 3
retry_delay_seconds: 2
retry_backoff_multiplier: 2.0
# Unified order-wait policy (MID, BID, ASK, MARKET).
# Active phase: walker repricing for MID. BID/ASK/MARKET have no walker —
# they treat the combined active+passive as one wait.
# Passive phase: hold the last-amended limit and wait for IB terminal.
# Total give-up window = active + passive. If the order hasn't reached
# a terminal state by then, the engine cancels the residual.
# LIMIT is fire-and-forget (GTC) and exempt.
# SMART_MARKET keeps its own staged knobs below.
reprice_steps: 10
reprice_active_duration_seconds: 30
reprice_passive_wait_seconds: 90
# Derived in code:
#   reprice_interval_seconds = active / steps          = 3
#   total_order_wait_seconds = active + passive        = 120

# SMART_MARKET's MKT residual leg (order.py:_execute_smart_market_order).
# Stays small because SMART_MARKET already staged-escalated through the
# walker and cancel phases — the residual MKT is meant to fail fast.
market_order_wait_seconds: 30
# After we send a cancel to IB, how long to wait for IB to either confirm the
# cancel or deliver more fills first. Short default (10s) covers the typical
# case; bump if your Gateway/market session runs slower (overnight IBEOS can
# take tens of seconds). The hard cap below is a safety net for a silent IB —
# hitting it logs a WARNING and proceeds with whatever status IB has reported.
cancel_settle_timeout_seconds: 120
# SMART_MARKET execution algo (session-aware aggressive-mid).
# RTH: reprice every N ms toward the far side (bid for SELL, ask for BUY)
#      for `duration` seconds, then cross to MKT for any residual.
# ETH: reprice every N ms but never past a floor of
#      trigger_price × (1 − max_slippage_pct) for SELL (or × (1 + pct) for BUY);
#      raises a CATASTROPHIC alert (EXIT_PRICE_CAP_REACHED) when the cap is hit,
#      and leaves the order resting at the cap for human intervention.
smart_market_reprice_interval_ms: 100
smart_market_rth_duration_seconds: 10
smart_market_eth_max_slippage_pct: 0.005
# How long a bot stays in "stoic mode" (ignoring all non-order events)
# waiting for the terminal order-updates event on an order it placed.
# Safety bound only — under normal operation the flag releases the
# moment the terminal event hits the Redis stream (sub-second). This
# is for the "IB went silent" / "terminal event dropped" case.
stoic_mode_max_seconds: 300
# Hard-stop circuit breaker. If any bot emits more than
# ``bot_order_rate_limit_count`` orders within
# ``bot_order_rate_limit_window_seconds``, the bot is force-STOPped
# to OFF and a CATASTROPHIC alert fires. Final safety net for runaway
# order-emission loops regardless of upstream cause.
bot_order_rate_limit_count: 5
bot_order_rate_limit_window_seconds: 2.0
ib_host: 127.0.0.1
# Gateway-mode auto-detection. On startup the engine/REPL probe each
# candidate port in order and connect to the first one that responds, then
# classify the session as paper/live from the managedAccounts prefix
# (DU* = paper, else live). Default order probes live first so a running
# paper Gateway is only selected when live isn't up. Swap entries to prefer
# paper, or list a single port to pin one mode.
# Ports: 4001 Gateway live, 4002 Gateway paper, 7496 TWS live, 7497 TWS paper.
ib_port_candidates:
  - 4001
  - 4002
ib_probe_timeout: 2.0
# Legacy single-port override. If set, the app still probes but typically
# only one port will be up. Left here for environments that ran with a
# hand-configured port.
ib_port: 4002
ib_client_id: 1
ib_min_call_interval_ms: 100
# IB market data type: 1=live, 2=frozen, 3=delayed, 4=delayed-frozen.
# Paper accounts must use 3 to avoid error 10197 (competing live session).
# Live accounts with real-time subscriptions should use 1. Auto-detect
# overrides this per-session based on the classified mode.
ib_market_data_type: 3
cache_ttl_seconds: 86400
redis_url: "redis://localhost:6379/0"
engine_internal_port: 8081
log_level: INFO
log_file_path: logs/ib_trader.log
log_rotation_max_bytes: 10485760
log_rotation_backup_count: 10
log_compress_old: true
heartbeat_interval_seconds: 30
heartbeat_stale_threshold_seconds: 300
poll_interval_seconds: 60
position_poll_interval_seconds: 60
# Maximum time the ledger will wait for IB to send a terminal status
# for a placed order before raising ORDER_TERMINAL_TIMEOUT as a
# user-acknowledgeable WARNING. The ledger never self-terminates —
# IB is the only source of terminal events. If IB stalls, the user
# reconciles manually.
order_terminal_timeout_seconds: 300
# Max age of the engine-wide market-data heartbeat key before a bot
# in AWAITING_EXIT_TRIGGER halts itself as BOT_CRASH. The heartbeat
# ticks whenever ANY tracked symbol publishes a quote, so this is a
# "is the engine receiving market data at all" check — NOT a
# per-symbol freshness check. Bots monitoring illiquid symbols (PSQ
# etc.) no longer false-positive during natural quiet periods.
market_data_heartbeat_stale_halt_seconds: 120
bot_runner_internal_port: 8082
reconciliation_interval_seconds: 3600
db_integrity_check_interval_seconds: 21600
daemon_tui_refresh_seconds: 5
tui_refresh_interval_seconds: 5

tui:
  panes:
    - name: header
      rank: 1
      height: 1
      enabled: true
    - name: log
      rank: 2
      height: 10
      enabled: true
    - name: positions
      rank: 3
      height: 10
      enabled: true
    - name: command
      rank: 4
      height: 8
      enabled: true
    - name: orders
      rank: 5
      height: 10
      enabled: true
